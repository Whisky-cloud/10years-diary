<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>十年日記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --paper: #EDE7DC;
    --paper-raised: #F5F0E6;
    --ink: #24303A;
    --ink-soft: #5B6670;
    --rule: #C9BFAE;
    --teal: #2F6B5E;
    --teal-deep: #204A41;
    --brass: #B4863A;
    --danger: #A6483A;
    --shadow: 0 1px 2px rgba(36,48,58,0.06), 0 6px 16px rgba(36,48,58,0.08);
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.35), transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(0,0,0,0.03), transparent 45%);
    color: var(--ink);
    font-family: "Zen Kaku Gothic New", "Hiragino Sans", sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  header.top{
    text-align:center;
    margin-bottom: 28px;
  }
  header.top .eyebrow{
    font-size: 12px;
    letter-spacing: 0.28em;
    color: var(--teal);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  header.top h1{
    font-family: "Shippori Mincho", serif;
    font-weight: 700;
    font-size: 30px;
    margin: 0;
    letter-spacing: 0.04em;
  }
  header.top .sub{
    color: var(--ink-soft);
    font-size: 13px;
    margin-top: 6px;
  }

  .card{
    background: var(--paper-raised);
    border: 1px solid var(--rule);
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h2{
    font-family: "Shippori Mincho", serif;
    font-size: 17px;
    margin: 0 0 14px;
    display:flex;
    align-items:center;
    gap: 8px;
  }
  .card h2 .dot{
    width:6px; height:6px; border-radius:50%; background: var(--brass);
    display:inline-block;
  }

  label{ font-size: 13px; color: var(--ink-soft); display:block; margin-bottom: 6px; }
  input[type=date], input[type=text]{
    font-family: inherit;
    font-size: 15px;
    padding: 10px 12px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
    width: 100%;
  }
  textarea{
    font-family: inherit;
    font-size: 15px;
    line-height: 1.7;
    padding: 12px 14px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
    width: 100%;
    min-height: 120px;
    resize: vertical;
  }
  .row{ display:flex; gap: 10px; align-items:center; flex-wrap: wrap; margin-top: 12px;}

  button{
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  button:active{ transform: translateY(1px); }
  .btn-primary{ background: var(--teal); color: #fff; }
  .btn-primary:hover{ background: var(--teal-deep); }
  .btn-ghost{ background: transparent; color: var(--ink-soft); border: 1px solid var(--rule); }
  .btn-ghost:hover{ background: rgba(0,0,0,0.03); }
  .btn-file{ display:inline-block; }
  button:disabled{ opacity: 0.5; cursor: default; }

  .status{ font-size: 12px; color: var(--ink-soft); min-height: 16px; margin-top: 8px; }
  .status.err{ color: var(--danger); }
  .status.ok{ color: var(--teal); }

  .signin-box{ text-align:center; padding: 40px 20px; }
  .signin-box p{ color: var(--ink-soft); font-size: 14px; line-height:1.8; }

  .setup-box{ padding: 20px; }
  .setup-box p{ font-size: 13px; color: var(--ink-soft); line-height:1.7; }

  .thumbs{ display:flex; gap:8px; flex-wrap:wrap; margin-top: 12px; }
  .thumbs img{
    width: 84px; height: 84px; object-fit: cover;
    border-radius: 6px; border: 1px solid var(--rule);
    background: #ddd;
    cursor: pointer;
    transition: transform 0.12s ease;
  }
  .thumbs img:hover{ transform: scale(1.04); }

  .lightbox{
    position: fixed;
    inset: 0;
    background: rgba(20,24,28,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 1000;
    cursor: zoom-out;
  }
  .lightbox-content{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    max-width: 100%;
    max-height: 100%;
    cursor: default;
  }
  .lightbox-content img{
    max-width: 100%;
    max-height: 80vh;
    border-radius: 6px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .btn-danger{
    background: #000;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-danger:hover{ background: #222; }
  .btn-danger:disabled{ opacity: 0.6; cursor: default; }

  .years{ display:flex; flex-direction:column; gap: 14px; }
  .year-card{
    position: relative;
    background: var(--paper-raised);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 18px 18px 16px 84px;
    box-shadow: var(--shadow);
    animation: rise 0.35s ease both;
  }
  @keyframes rise{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .year-stamp{
    position:absolute;
    left: 14px; top: 16px;
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 2px solid var(--brass);
    color: var(--brass);
    display:flex; align-items:center; justify-content:center;
    font-family: "Shippori Mincho", serif;
    font-weight: 700;
    font-size: 13px;
    transform: rotate(-4deg);
    line-height: 1.1;
    text-align:center;
  }
  .year-stamp .yy{ font-size: 15px; }
  .year-text{
    white-space: pre-wrap;
    line-height: 1.8;
    font-size: 14.5px;
  }
  .year-text.empty{ color: var(--ink-soft); font-style: italic; }
  .years-empty{
    text-align:center;
    color: var(--ink-soft);
    font-size: 13px;
    padding: 30px 10px;
  }

  .year-text mark{
    background: rgba(180,134,58,0.28);
    color: inherit;
    border-radius: 3px;
    padding: 0 2px;
  }

  .hidden{ display:none !important; }

  footer.foot{
    text-align:center;
    margin-top: 30px;
    font-size: 11px;
    color: var(--ink-soft);
  }
  footer.foot a{ color: var(--teal); }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="eyebrow">Ten Year Diary</div>
    <h1>十年日記</h1>
    <div class="sub" id="headerSub">Googleドライブに、毎日の記録を積み重ねる</div>
  </header>

  <!-- 初回だけ表示: クライアントID設定 -->
  <div class="card setup-box hidden" id="setupBox">
    <h2><span class="dot"></span>初回設定</h2>
    <p>Google Cloud Consoleで取得した「OAuhクライアントID」を貼り付けてください。手順は同梱のSETUP.mdを参照してください。この情報はこの端末のブラウザにのみ保存されます。</p>
    <label for="clientIdInput">OAuth クライアント ID</label>
    <input type="text" id="clientIdInput" placeholder="xxxxxxxxxx-xxxxxxxxxxxxxxxx.apps.googleusercontent.com">
    <div class="row">
      <button class="btn-primary" id="saveClientIdBtn">保存して次へ</button>
    </div>
    <div class="status" id="setupStatus"></div>
  </div>

  <!-- サインイン -->
  <div class="card signin-box hidden" id="signinBox">
    <h2 style="justify-content:center;"><span class="dot"></span>サインイン</h2>
    <p>あなたのGoogleドライブに、このアプリ専用のフォルダを作って記録を保存します。</p>
    <div class="row" style="justify-content:center;">
      <button class="btn-primary" id="signinBtn">Googleでサインイン</button>
      <button class="btn-ghost" id="changeClientIdBtn">クライアントIDを変更</button>
    </div>
    <div class="status" id="signinStatus"></div>
  </div>

  <!-- メインUI -->
  <div id="mainBox" class="hidden">

    <div class="card">
      <h2><span class="dot"></span>対象日</h2>
      <input type="date" id="targetDate">
      <div class="status" id="dateStatus"></div>
    </div>

    <div class="card">
      <h2><span class="dot"></span>この日の記録</h2>
      <textarea id="entryText" placeholder="今日あったこと、思ったこと..."></textarea>
      <div class="row">
        <button class="btn-primary" id="saveTextBtn">テキストを保存</button>
        <label class="btn-ghost btn-file" for="imageInput">画像を追加</label>
        <input type="file" id="imageInput" accept="image/*" multiple class="hidden">
      </div>
      <div class="row" id="customNameRow" style="margin-top:8px;">
        <input type="text" id="customNameInput" placeholder="ファイル名を指定する場合はここに入力(空欄なら自動命名)">
      </div>
      <div class="thumbs" id="todayThumbs"></div>
      <div class="status" id="saveStatus"></div>
    </div>

    <div class="card">
      <h2><span class="dot"></span>日記を検索</h2>
      <div class="row" style="margin-top:0;">
        <input type="text" id="searchInput" placeholder="含まれる語句を入力" style="flex:1;">
        <button class="btn-primary" id="searchBtn">検索</button>
        <button class="btn-ghost" id="searchClearBtn">クリア</button>
      </div>
      <div class="status" id="searchStatus"></div>
      <div class="years" id="searchResults"></div>
    </div>

    <div class="card">
      <h2><span class="dot"></span>過去の同じ日</h2>
      <div class="years" id="yearsList"></div>
    </div>

    <div class="row" style="justify-content:center;">
      <button class="btn-ghost" id="backupNowBtn">今すぐバックアップ</button>
      <button class="btn-ghost" id="signoutBtn">サインアウト</button>
    </div>
    <div class="status" id="backupStatus" style="text-align:center;"></div>
  </div>

  <footer class="foot">データは自分のGoogleドライブ内「Decade Diary」フォルダに保存されます</footer>

  <div id="lightbox" class="lightbox hidden">
    <div id="lightboxContent" class="lightbox-content">
      <img id="lightboxImg" src="">
      <button id="lightboxDeleteBtn" class="btn-danger">この写真を削除</button>
    </div>
  </div>
</div>

<script>
const APP_FOLDER_NAME = 'Decade Diary';
const IMAGES_FOLDER_NAME = '画像';
const BACKUPS_FOLDER_NAME = 'バックアップ';
const DIARY_FILE_NAME = 'diary.json';
const BACKUP_INTERVAL_DAYS = 30;
const CLIENT_ID_KEY = 'tenYearDiary.clientId';
const DEFAULT_CLIENT_ID = '992421096631-lcg7vv9jne6r689cbaqfh2qp2cemai0f.apps.googleusercontent.com';
const SCOPE = 'https://www.googleapis.com/auth/drive.file';

let tokenClient = null;
let accessToken = null;
let mainFolderId = null;
let backupsFolderId = null;
let imagesFolderId = null;
let diaryFileId = null;
let diaryEntries = [];
let imageFiles = [];
let blobUrlCache = {};

const $ = (id) => document.getElementById(id);

function todayISO(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}

function setStatus(id, msg, type){
  const el = $(id);
  el.textContent = msg || '';
  el.className = 'status' + (type ? ' ' + type : '');
}

// ---------- 起動処理 ----------
window.addEventListener('load', () => {
  $('targetDate').value = todayISO();
  $('targetDate').max = todayISO();

  const savedClientId = localStorage.getItem(CLIENT_ID_KEY) || DEFAULT_CLIENT_ID;
  if(!savedClientId){
    $('setupBox').classList.remove('hidden');
  } else {
    setupGis(savedClientId);
    $('signinBox').classList.remove('hidden');
  }
});

$('saveClientIdBtn').onclick = () => {
  const val = $('clientIdInput').value.trim();
  if(!val){ setStatus('setupStatus', 'クライアントIDを入力してください', 'err'); return; }
  localStorage.setItem(CLIENT_ID_KEY, val);
  $('setupBox').classList.add('hidden');
  setupGis(val);
  $('signinBox').classList.remove('hidden');
};

$('changeClientIdBtn').onclick = () => {
  $('signinBox').classList.add('hidden');
  $('clientIdInput').value = localStorage.getItem(CLIENT_ID_KEY) || '';
  $('setupBox').classList.remove('hidden');
};

function setupGis(clientId){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: SCOPE,
    callback: async (resp) => {
      if(resp.error){
        setStatus('signinStatus', 'サインインに失敗しました: ' + resp.error, 'err');
        return;
      }
      accessToken = resp.access_token;
      localStorage.setItem('tenYearDiary.consented', '1');
      $('signinBox').classList.add('hidden');
      $('mainBox').classList.remove('hidden');
      await initAfterSignIn();
    },
    error_callback: (err) => {
      setStatus('signinStatus', 'サインインエラー: ' + (err && err.message ? err.message : 'unknown'), 'err');
    }
  });
}

$('signinBtn').onclick = () => {
  if(!tokenClient){ setStatus('signinStatus', 'クライアントIDが未設定です', 'err'); return; }
  setStatus('signinStatus', 'サインイン中...', '');
  const alreadyConsented = localStorage.getItem('tenYearDiary.consented') === '1';
  tokenClient.requestAccessToken(alreadyConsented ? {} : { prompt: 'consent' });
};

$('signoutBtn').onclick = () => {
  if(accessToken){
    google.accounts.oauth2.revoke(accessToken, () => {});
  }
  accessToken = null;
  $('mainBox').classList.add('hidden');
  $('signinBox').classList.remove('hidden');
  setStatus('signinStatus', 'サインアウトしました', 'ok');
};

// ---------- Drive API ヘルパー ----------
async function driveFetch(url, options={}){
  options.headers = options.headers || {};
  options.headers['Authorization'] = 'Bearer ' + accessToken;
  const res = await fetch(url, options);
  if(!res.ok){
    const t = await res.text();
    throw new Error('Drive API error ' + res.status + ': ' + t);
  }
  return res;
}

function escapeQ(s){ return s.replace(/'/g, "\\'"); }

async function ensureFolder(name, parentId){
  let q = `name='${escapeQ(name)}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
  if(parentId) q += ` and '${parentId}' in parents`;
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)&spaces=drive`);
  const data = await res.json();
  if(data.files && data.files.length) return data.files[0].id;

  const meta = { name, mimeType: 'application/vnd.google-apps.folder' };
  if(parentId) meta.parents = [parentId];
  const createRes = await driveFetch('https://www.googleapis.com/drive/v3/files?fields=id', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(meta)
  });
  const created = await createRes.json();
  return created.id;
}

async function ensureDiaryFile(folderId){
  const q = `name='${DIARY_FILE_NAME}' and trashed=false and '${folderId}' in parents`;
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)&spaces=drive`);
  const data = await res.json();
  if(data.files && data.files.length) return data.files[0].id;

  const boundary = 'tenyeardiaryboundary';
  const metadata = { name: DIARY_FILE_NAME, parents: [folderId], mimeType: 'application/json' };
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n[]\r\n` +
    `--${boundary}--`;
  const res2 = await driveFetch(`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id`, {
    method: 'POST',
    headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
    body
  });
  const created = await res2.json();
  return created.id;
}

async function loadDiary(fileId){
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
  const text = await res.text();
  try { return JSON.parse(text || '[]'); } catch(e){ return []; }
}

async function saveDiary(fileId, entries){
  await driveFetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(entries)
  });
}

async function listImages(folderId){
  const q = `'${folderId}' in parents and trashed=false`;
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name,appProperties,createdTime,imageMediaMetadata(time))&pageSize=1000&spaces=drive`);
  const data = await res.json();
  return data.files || [];
}

function compactDate(dateStr){
  // "2026-07-22" -> "20260722"
  return dateStr.replace(/-/g, '');
}

function timeStamp4(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return hh + mm;
}

// デフォルト名: 20260722_1234.png (日付 + 時分4桁 + 拡張子)。同名がすでにあれば末尾に連番を付ける。
function buildDefaultFilename(dateStr, ext, usedNames){
  const base = compactDate(dateStr);
  const time = timeStamp4();
  let filename = `${base}_${time}.${ext}`;
  let n = 2;
  while(usedNames.has(filename)){
    filename = `${base}_${time}_${n}.${ext}`;
    n++;
  }
  usedNames.add(filename);
  return filename;
}

// 日付との紐付けは appProperties.date で管理するので、ファイル名は自由に付けられる
async function uploadImage(folderId, file, dateStr, usedNames, customName){
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
  let filename;
  if(customName && customName.trim()){
    filename = customName.trim();
    if(!/\.[a-zA-Z0-9]+$/.test(filename)){
      filename += '.' + ext; // 拡張子が無ければ元ファイルの拡張子を補う
    }
  } else {
    filename = buildDefaultFilename(dateStr, ext, usedNames);
  }
  usedNames.add(filename);
  const metadata = {
    name: filename,
    parents: [folderId],
    appProperties: { date: dateStr }
  };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', file);
  await driveFetch(`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,appProperties`, {
    method: 'POST',
    body: form
  });
}

async function getImageBlobUrl(fileId){
  if(blobUrlCache[fileId]) return blobUrlCache[fileId];
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  blobUrlCache[fileId] = url;
  return url;
}

async function getDiaryFileProps(){
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files/${diaryFileId}?fields=appProperties`);
  const data = await res.json();
  return data.appProperties || {};
}

function daysBetween(dateA, dateB){
  return Math.floor((new Date(dateB) - new Date(dateA)) / 86400000);
}

async function performBackup(){
  if(!backupsFolderId){
    backupsFolderId = await ensureFolder(BACKUPS_FOLDER_NAME, mainFolderId);
  }
  const name = `diary_${todayISO()}.json`;
  await driveFetch(`https://www.googleapis.com/drive/v3/files/${diaryFileId}/copy?fields=id`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, parents: [backupsFolderId] })
  });
  await driveFetch(`https://www.googleapis.com/drive/v3/files/${diaryFileId}?fields=id`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ appProperties: { lastBackup: todayISO() } })
  });
}

// アプリを開くたびに呼ぶ。前回のバックアップから約1ヶ月経っていれば自動でバックアップを作る
async function autoBackupIfNeeded(){
  try{
    const props = await getDiaryFileProps();
    const last = props.lastBackup;
    if(!last || daysBetween(last, todayISO()) >= BACKUP_INTERVAL_DAYS){
      await performBackup();
      setStatus('backupStatus', '月次バックアップを自動作成しました(バックアップフォルダ内)', 'ok');
    }
  } catch(e){
    console.error('auto backup failed', e);
  }
}

$('backupNowBtn').onclick = async () => {
  setStatus('backupStatus', 'バックアップ作成中...', '');
  try{
    await performBackup();
    setStatus('backupStatus', 'バックアップを作成しました(バックアップフォルダ内)', 'ok');
  } catch(e){
    console.error(e);
    setStatus('backupStatus', 'バックアップに失敗しました: ' + e.message, 'err');
  }
};

// ---------- ライトボックス ----------
let currentLightboxFileId = null;

function openLightbox(url, fileId){
  $('lightboxImg').src = url;
  currentLightboxFileId = fileId || null;
  $('lightbox').classList.remove('hidden');
}
function closeLightbox(){
  $('lightbox').classList.add('hidden');
  $('lightboxImg').src = '';
  currentLightboxFileId = null;
}
$('lightbox').addEventListener('click', closeLightbox);
$('lightboxContent').addEventListener('click', (ev) => ev.stopPropagation());
document.addEventListener('keydown', (ev) => {
  if(ev.key === 'Escape') closeLightbox();
});

$('lightboxDeleteBtn').addEventListener('click', async () => {
  if(!currentLightboxFileId) return;
  const ok = confirm('この写真を削除します。この操作は取り消せません。本当によろしいですか?');
  if(!ok) return;

  const fileId = currentLightboxFileId;
  const btn = $('lightboxDeleteBtn');
  btn.disabled = true;
  btn.textContent = '削除中...';
  try{
    await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, { method: 'DELETE' });
    imageFiles = imageFiles.filter(f => f.id !== fileId);
    if(blobUrlCache[fileId]){
      URL.revokeObjectURL(blobUrlCache[fileId]);
      delete blobUrlCache[fileId];
    }
    closeLightbox();
    renderTodayThumbs();
    renderYears();
  } catch(e){
    console.error(e);
    alert('削除に失敗しました: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'この写真を削除';
  }
});

// ---------- 検索 ----------
function escapeRegExp(s){
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, query){
  const escaped = escapeHtml(text);
  if(!query) return escaped;
  const re = new RegExp(escapeRegExp(escapeHtml(query)), 'gi');
  return escaped.replace(re, (m) => `<mark>${m}</mark>`);
}

function runSearch(){
  const query = $('searchInput').value.trim();
  const box = $('searchResults');
  box.innerHTML = '';
  if(!query){
    setStatus('searchStatus', '', '');
    return;
  }
  const q = query.toLowerCase();
  const hits = diaryEntries
    .filter(e => e.text && e.text.toLowerCase().includes(q))
    .sort((a, b) => b.date.localeCompare(a.date));

  if(!hits.length){
    setStatus('searchStatus', '「' + query + '」を含む日記は見つかりませんでした', '');
    return;
  }
  setStatus('searchStatus', hits.length + '件見つかりました', 'ok');

  hits.forEach(e => {
    const y = e.date.slice(0, 4);
    const card = document.createElement('div');
    card.className = 'year-card';
    card.innerHTML = `
      <div class="year-stamp"><span class="yy">${y}</span>年</div>
      <div class="status" style="margin-top:-4px; margin-bottom:8px;">${e.date}</div>
      <div class="year-text">${highlight(e.text, query)}</div>
    `;
    box.appendChild(card);
  });
}

$('searchBtn').onclick = runSearch;
$('searchInput').addEventListener('keydown', (ev) => {
  if(ev.key === 'Enter') runSearch();
});
$('searchClearBtn').onclick = () => {
  $('searchInput').value = '';
  $('searchResults').innerHTML = '';
  setStatus('searchStatus', '', '');
};

// ---------- 検索 終わり ----------

// ---------- 初期化 ----------
async function initAfterSignIn(){
  setStatus('dateStatus', 'フォルダを準備中...', '');
  try{
    mainFolderId = await ensureFolder(APP_FOLDER_NAME, null);
    imagesFolderId = await ensureFolder(IMAGES_FOLDER_NAME, mainFolderId);
    diaryFileId = await ensureDiaryFile(mainFolderId);
    diaryEntries = await loadDiary(diaryFileId);
    imageFiles = await listImages(imagesFolderId);
    setStatus('dateStatus', '', '');
    renderAll();
    autoBackupIfNeeded();
  } catch(e){
    console.error(e);
    setStatus('dateStatus', '準備に失敗しました: ' + e.message, 'err');
  }
}

$('targetDate').onchange = () => renderAll();

$('saveTextBtn').onclick = async () => {
  const date = $('targetDate').value;
  const text = $('entryText').value;
  setStatus('saveStatus', '保存中...', '');
  try{
    const idx = diaryEntries.findIndex(e => e.date === date);
    if(idx >= 0){
      diaryEntries[idx].text = text;
    } else {
      diaryEntries.push({ date, text });
    }
    await saveDiary(diaryFileId, diaryEntries);
    setStatus('saveStatus', '保存しました', 'ok');
    renderYears();
  } catch(e){
    console.error(e);
    setStatus('saveStatus', '保存に失敗しました: ' + e.message, 'err');
  }
};

$('imageInput').onchange = async (ev) => {
  const files = Array.from(ev.target.files || []);
  if(!files.length) return;
  const date = $('targetDate').value;
  const customNameRaw = $('customNameInput').value.trim();
  // 名前指定は1枚選択時のみ有効(複数枚に同じ名前を付けると重複するため)
  const customName = (customNameRaw && files.length === 1) ? customNameRaw : '';
  if(customNameRaw && files.length > 1){
    setStatus('saveStatus', '名前指定は1枚のみの時に使えます。今回は自動命名で保存します。', '');
  } else {
    setStatus('saveStatus', '画像をアップロード中...', '');
  }
  try{
    const usedNames = new Set(imageFiles.map(f => f.name));
    for(const f of files){
      await uploadImage(imagesFolderId, f, date, usedNames, customName);
    }
    imageFiles = await listImages(imagesFolderId);
    setStatus('saveStatus', '画像を追加しました', 'ok');
    $('customNameInput').value = '';
    renderTodayThumbs();
    renderYears();
  } catch(e){
    console.error(e);
    setStatus('saveStatus', 'アップロードに失敗しました: ' + e.message, 'err');
  } finally {
    ev.target.value = '';
  }
};

// ---------- 描画 ----------
function renderAll(){
  const date = $('targetDate').value;
  const entry = diaryEntries.find(e => e.date === date);
  $('entryText').value = entry ? entry.text : '';
  renderTodayThumbs();
  renderYears();
}

// 日付の判定順序:
// 1. ファイル名に含まれる日付らしき文字列(YYYYMMDD / YYYY-MM-DD)
// 2. アプリがアップロード時に記録した隠しプロパティ(名前に日付が無い場合のフォールバック)
// 3. 写真のEXIF撮影日時(Googleドライブが自動で読み取っている場合)
// 4. Googleドライブへのアップロード日時(最終手段)
function parseDateFromName(name){
  const m = name.match(/(\d{4})-?(\d{2})-?(\d{2})/);
  if(!m) return null;
  const [, y, mo, d] = m;
  const mm = parseInt(mo, 10), dd = parseInt(d, 10);
  if(mm < 1 || mm > 12 || dd < 1 || dd > 31) return null;
  return `${y}-${mo}-${d}`;
}

function parseDateFromExif(f){
  const t = f.imageMediaMetadata && f.imageMediaMetadata.time;
  if(!t) return null;
  const m = t.match(/^(\d{4}):(\d{2}):(\d{2})/);
  return m ? `${m[1]}-${m[2]}-${m[3]}` : null;
}

function dateOf(f){
  const fromName = parseDateFromName(f.name);
  if(fromName) return fromName;
  if(f.appProperties && f.appProperties.date) return f.appProperties.date;
  const fromExif = parseDateFromExif(f);
  if(fromExif) return fromExif;
  if(f.createdTime) return f.createdTime.slice(0, 10);
  return null;
}

function imagesForDate(dateStr){
  return imageFiles.filter(f => dateOf(f) === dateStr);
}

async function renderTodayThumbs(){
  const date = $('targetDate').value;
  const imgs = imagesForDate(date);
  const box = $('todayThumbs');
  box.innerHTML = '';
  for(const f of imgs){
    const img = document.createElement('img');
    box.appendChild(img);
    getImageBlobUrl(f.id).then(url => { img.src = url; img.onclick = () => openLightbox(url, f.id); }).catch(()=>{});
  }
}

async function renderYears(){
  const date = $('targetDate').value;
  const mmdd = date.slice(5); // MM-DD
  const selectedYear = date.slice(0,4);

  const byYear = {};
  diaryEntries.forEach(e => {
    if(e.date.slice(5) === mmdd && e.date.slice(0,4) !== selectedYear){
      byYear[e.date.slice(0,4)] = byYear[e.date.slice(0,4)] || { text: '', images: [] };
      byYear[e.date.slice(0,4)].text = e.text;
    }
  });
  imageFiles.forEach(f => {
    const d = dateOf(f);
    if(d && d.slice(5) === mmdd && d.slice(0,4) !== selectedYear){
      const y = d.slice(0,4);
      byYear[y] = byYear[y] || { text: '', images: [] };
      byYear[y].images.push(f);
    }
  });

  const years = Object.keys(byYear).sort((a,b) => b - a);
  const list = $('yearsList');
  list.innerHTML = '';

  if(!years.length){
    list.innerHTML = '<div class="years-empty">この日の記録はまだ他の年にありません。記録を重ねるとここに表示されます。</div>';
    return;
  }

  years.forEach(y => {
    const data = byYear[y];
    const card = document.createElement('div');
    card.className = 'year-card';
    card.innerHTML = `
      <div class="year-stamp"><span class="yy">${y}</span>年</div>
      <div class="year-text ${data.text ? '' : 'empty'}">${data.text ? escapeHtml(data.text) : '(テキストの記録なし)'}</div>
      <div class="thumbs"></div>
    `;
    list.appendChild(card);
    const thumbBox = card.querySelector('.thumbs');
    data.images.forEach(f => {
      const img = document.createElement('img');
      thumbBox.appendChild(img);
      getImageBlobUrl(f.id).then(url => { img.src = url; img.onclick = () => openLightbox(url, f.id); }).catch(()=>{});
    });
  });
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
